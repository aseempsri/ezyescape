# Ezy Escape — nginx site for Hostinger VPS
# Place at: /etc/nginx/sites-available/ezyescape
# Enable:   ln -sf /etc/nginx/sites-available/ezyescape /etc/nginx/sites-enabled/ezyescape
#
# Does NOT modify news-adda or socialscreen.
# API listens on 127.0.0.1:3001 (PM2 process: ezyescape-api)
# news-adda keeps port 3000.
#
# 1. Point Cloudflare DNS for ezyescape.com + www to this VPS IP
# 2. Install this HTTP-only site, reload nginx
# 3. certbot --nginx -d ezyescape.com -d www.ezyescape.com

server {
    listen 80;
    server_name ezyescape.com www.ezyescape.com;

    root /var/www/ezyescape/web/dist;
    index index.html;
    client_max_body_size 100M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/ezyescape/web/dist;
        default_type "text/plain";
        try_files $uri =404;
    }

    location /auth {
        proxy_pass http://127.0.0.1:3001;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /uploads {
        proxy_pass http://127.0.0.1:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
